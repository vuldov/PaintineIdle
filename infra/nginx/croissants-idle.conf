server {
    listen 80;
    server_name paintine.fr www.paintine.fr;

    # Document root — must match VPS_TARGET_PATH in GitHub Secrets
    root /var/www/croissants-idle;
    index index.html;

    # ── SPA routing ───────────────────────────────────────────────
    # All routes fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache headers for hashed assets ───────────────────────────
    # Vite generates hashed filenames (e.g., index-abc123.js)
    # so we can cache them aggressively for 1 year
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── No cache for index.html ───────────────────────────────────
    # index.html must always be fresh so the browser loads new asset hashes
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Gzip compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Logging ───────────────────────────────────────────────────
    access_log /var/log/nginx/croissants-idle.access.log;
    error_log /var/log/nginx/croissants-idle.error.log;
}
