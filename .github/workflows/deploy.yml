name: Test, Build & Deploy

# Only deploy on push to main; run tests on pull requests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Step 1: Run unit tests ──────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (reproducible)
        run: npm ci --legacy-peer-deps

      - name: Run Vitest unit tests
        run: npm run test

  # ── Step 2: Build static files ──────────────────────────────────────
  build:
    name: Build production bundle
    runs-on: ubuntu-latest
    needs: test  # Only build if tests pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (reproducible)
        run: npm ci --legacy-peer-deps

      - name: Build static site
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Step 3: Deploy to VPS via rsync ─────────────────────────────────
  deploy:
    name: Deploy to OVH VPS
    runs-on: ubuntu-latest
    needs: build  # Only deploy after successful build
    # Only deploy on push to main — never on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Disable strict host key checking to avoid interactive prompts.
          # This is acceptable for CI because the VPS host is trusted and
          # we control the secret values. For extra security, you can replace
          # this with a known_hosts file containing your VPS fingerprint.
          echo "Host *" > ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config

      - name: Deploy to VPS via rsync
        run: |
          # rsync flags:
          #   -a  archive mode (preserves permissions, timestamps, etc.)
          #   -v  verbose output for debugging
          #   -z  compress data during transfer
          #   --delete  remove files on remote that no longer exist in dist/
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_TARGET_PATH }}/

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
